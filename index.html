<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avaliações Google</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      transparent;
      --ink:     #1a1410;
      --brand:   #551b2a;
      --brand-lt:#7a2a3d;
      --stone:   #e0dbd3;
      --muted:   #7a7063;
      --card-bg: #f5f4ef;
      --shadow:  0 2px 16px rgba(26,20,16,.10);
    }

    html, body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      margin: 0;
      padding: 0;
    }

    .widget {
      width: 100%;
      padding: 2rem 1.2rem 2.5rem;
    }

    /* ── HEADER ── */
    .w-header { text-align: center; margin-bottom: 2rem; }
    .badge {
      display: inline-flex; align-items: center; gap: .4rem;
      background: var(--brand); color: #fff;
      font-size: .68rem; font-weight: 500; letter-spacing: .13em;
      text-transform: uppercase; padding: .32rem .85rem;
      border-radius: 2rem; margin-bottom: .9rem;
    }
    .w-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 3.5vw, 2.2rem);
      font-weight: 600; color: var(--ink); line-height: 1.2;
    }

    /* ── SUMMARY ── */
    .summary {
      display: flex; align-items: center; justify-content: center;
      gap: 1rem; margin-bottom: .6rem; flex-wrap: wrap;
    }
    .avg-num {
      font-family: 'Playfair Display', serif;
      font-size: 3.6rem; font-weight: 600;
      color: var(--brand); line-height: 1;
    }
    .avg-details { display: flex; flex-direction: column; gap: .25rem; }
    .stars-row { display: flex; gap: 3px; }
    .stars-row .s { font-size: 1.2rem; }
    .s.on  { color: var(--brand); }
    .s.off { color: var(--stone); }
    .total-label { font-size: .78rem; color: var(--muted); }

    .divider {
      width: 48px; height: 2px;
      background: linear-gradient(90deg, var(--brand), var(--brand-lt));
      border-radius: 2px; margin: 1.4rem auto 2rem;
    }

    /* ── GRID ── */
    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.2rem;
      width: 100%;
    }

    @media (max-width: 600px) {
      .reviews-grid { grid-template-columns: 1fr; }
      .avg-num { font-size: 3rem; }
    }

    /* ── CARD ── */
    .review-card {
      background: var(--card-bg);
      border-radius: .85rem;
      padding: 1.35rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--stone);
      display: flex; flex-direction: column; gap: .85rem;
      opacity: 0; transform: translateY(14px);
      animation: fadeUp .45s ease forwards;
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .card-top { display: flex; align-items: center; gap: .75rem; }

    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      border: 2px solid var(--stone); flex-shrink: 0;
      background: #e8e2db;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: .95rem; color: var(--brand); font-weight: 600;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    .author-name {
      font-weight: 500; font-size: .9rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .star-row { display: flex; gap: 2px; }
    .star-row .s { font-size: .85rem; }

    .review-text {
      font-size: .85rem; line-height: 1.7;
      color: #3d342a; font-weight: 300; flex: 1;
    }
    .review-text.clamp {
      display: -webkit-box;
      -webkit-line-clamp: 10;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .read-more {
      background: none; border: none; cursor: pointer;
      color: var(--brand); font-size: .78rem; font-weight: 500;
      padding: 0; margin-top: .3rem; display: inline-block;
      font-family: 'DM Sans', sans-serif;
    }
    .read-more:hover { text-decoration: underline; }

    .card-footer {
      border-top: 1px solid var(--stone);
      padding-top: .7rem;
      display: flex; align-items: center; gap: .4rem;
    }
    .g-icon { width: 14px; height: 14px; flex-shrink: 0; }
    .card-footer span { font-size: .68rem; color: var(--muted); letter-spacing: .03em; }

    /* ── SKELETON ── */
    .skel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.2rem;
    }
    @media (max-width: 600px) { .skel-grid { grid-template-columns: 1fr; } }

    .skel-card {
      background: var(--card-bg); border-radius: .85rem;
      padding: 1.35rem; box-shadow: var(--shadow); border: 1px solid var(--stone);
    }
    .sk {
      background: linear-gradient(90deg, var(--stone) 25%, #ece8e0 50%, var(--stone) 75%);
      background-size: 200% 100%;
      animation: shim 1.4s infinite; border-radius: 5px;
    }
    @keyframes shim { to { background-position: -200% 0; } }

    /* ── MSG BOX ── */
    .msg-box {
      max-width: 480px; margin: 0 auto;
      background: var(--card-bg); border: 1px solid var(--stone);
      border-radius: 1rem; padding: 1.8rem; text-align: center;
      box-shadow: var(--shadow);
    }
    .msg-box h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: .6rem; }
    .msg-box p  { font-size: .85rem; color: var(--muted); line-height: 1.7; margin-bottom: .35rem; }
    .msg-box code {
      background: #edeae4; border: 1px solid var(--stone);
      border-radius: 4px; padding: .1rem .4rem;
      font-size: .78rem; color: var(--brand);
    }
    .msg-box pre {
      background: #edeae4; border: 1px solid var(--stone);
      border-radius: .5rem; padding: .75rem 1rem;
      font-size: .75rem; text-align: left; overflow-x: auto;
      margin-top: .5rem; color: #5a4a3a; line-height: 1.6;
    }

    .btn-back {
      display: inline-flex; align-items: center; gap: .4rem;
      margin-top: 1rem; padding: .58rem 1.1rem;
      border: 1.5px solid var(--stone); border-radius: .5rem;
      background: transparent; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: .83rem;
      color: var(--muted); transition: all .2s;
    }
    .btn-back:hover { border-color: var(--brand); color: var(--brand); }

    .form-wrap { text-align: left; }
    .form-wrap label {
      display: block; font-size: .73rem; font-weight: 500;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--muted); margin: .85rem 0 .32rem;
    }
    .form-wrap input {
      width: 100%; padding: .68rem .95rem;
      border: 1px solid var(--stone); border-radius: .5rem;
      font-family: 'DM Sans', sans-serif; font-size: .87rem;
      background: #edeae4; color: var(--ink);
      outline: none; transition: border-color .2s;
    }
    .form-wrap input:focus { border-color: var(--brand); }
    .hint { font-size: .72rem; color: var(--muted); margin-top: .28rem; line-height: 1.5; }

    .btn-primary {
      margin-top: 1.2rem; width: 100%; padding: .8rem;
      background: var(--brand); color: #fff; border: none;
      border-radius: .5rem; font-family: 'Playfair Display', serif;
      font-size: .98rem; cursor: pointer; transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .88; }

    .back-row { margin-bottom: 1.2rem; }
    .back-row button {
      background: none; border: none; cursor: pointer;
      display: inline-flex; align-items: center; gap: .3rem;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: .82rem; padding: 0; transition: color .2s;
    }
    .back-row button:hover { color: var(--brand); }

    .no-rev { text-align: center; color: var(--muted); font-size: .9rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
<div class="widget">

  <div class="w-header">
    <div class="badge">★ Google Meu Negócio</div>
    <h2>O que nossos clientes dizem</h2>
  </div>

  <div id="summary-section" style="display:none">
    <div class="summary">
      <div class="avg-num" id="avg-num">—</div>
      <div class="avg-details">
        <div class="stars-row" id="avg-stars"></div>
        <div class="total-label" id="avg-total"></div>
      </div>
    </div>
    <div class="divider"></div>
  </div>

  <div id="content"></div>
</div>

<div id="map" style="display:none"></div>

<script>
/* ═══════════════════════════════════════
   CONFIGURAÇÃO
═══════════════════════════════════════ */
const CFG = {
  apiKey: "AIzaSyBHJkUQN1gaLkH2HVXVW-V3WY6lTGJX7rs",
  locations: [
    { label: "Local 1", placeId: "ChIJM9FLeUXl3JQRIP4GrM3Iw1M" },
    { label: "Local 2", placeId: "ChIJba89okrj3JQRbHFXw3unq24" },
  ]
};
/* ═══════════════════════════════════════ */

const $ = id => document.getElementById(id);
const content = $("content");
const summarySection = $("summary-section");

// ── Helpers ───────────────────────────
const starsHTML = r =>
  [1,2,3,4,5].map(i => `<span class="s ${i <= Math.round(r) ? "on" : "off"}">★</span>`).join("");

// Abbreviate name: "João Silva Santos" → "João S. S."
function abbreviateName(name) {
  if (!name) return "?";
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0];
  return parts[0] + " " + parts.slice(1).map(p => p[0].toUpperCase() + ".").join(" ");
}

// Initials for avatar: "João Silva" → "JS"
const initials = n =>
  (n || "?").split(/\s+/).map(w => w[0]).slice(0, 2).join("").toUpperCase();

const gIcon = `<svg class="g-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
  <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
  <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
  <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
</svg>`;

// ── Skeleton ──────────────────────────
function showSkeleton() {
  summarySection.style.display = "none";
  let h = '<div class="skel-grid">';
  for (let i = 0; i < 6; i++) h += `
    <div class="skel-card">
      <div style="display:flex;gap:.75rem;align-items:center;margin-bottom:.9rem">
        <div class="sk" style="width:40px;height:40px;border-radius:50%"></div>
        <div style="flex:1">
          <div class="sk" style="height:10px;width:55%;margin-bottom:7px"></div>
          <div class="sk" style="height:10px;width:30%"></div>
        </div>
      </div>
      <div class="sk" style="height:10px;width:40%;margin-bottom:10px"></div>
      <div class="sk" style="height:10px;width:100%;margin-bottom:6px"></div>
      <div class="sk" style="height:10px;width:85%;margin-bottom:6px"></div>
      <div class="sk" style="height:10px;width:70%"></div>
    </div>`;
  content.innerHTML = h + "</div>";
}

// ── Render all reviews ────────────────
function renderReviews(allReviews, weightedRating, totalCount) {
  // Summary bar
  $("avg-num").textContent   = weightedRating.toFixed(1);
  $("avg-stars").innerHTML   = starsHTML(weightedRating);
  $("avg-total").textContent = `${totalCount.toLocaleString("pt-BR")} avaliações no Google`;
  summarySection.style.display = "block";

  if (!allReviews.length) {
    content.innerHTML = '<p class="no-rev">Nenhuma avaliação encontrada.</p>';
    return;
  }

  let h = '<div class="reviews-grid">';
  allReviews.forEach((r, i) => {
    const delay   = (i * 0.055).toFixed(2);
    const longTxt = r.text && r.text.length > 300;
    const id      = `rv${i}`;
    const abbrev  = abbreviateName(r.author_name);
    const ini     = initials(r.author_name);

    h += `
      <div class="review-card" style="animation-delay:${delay}s">
        <div class="card-top">
          <div class="avatar">
            ${r.profile_photo_url
              ? `<img src="${r.profile_photo_url}" alt="${abbrev}">`
              : ini}
          </div>
          <div class="author-name">${abbrev}</div>
        </div>
        <div class="star-row">${starsHTML(r.rating)}</div>
        ${r.text ? `<div>
          <div class="review-text ${longTxt ? "clamp" : ""}" id="${id}">${r.text}</div>
          ${longTxt ? `<button class="read-more" onclick="toggle('${id}',this)">Ler mais</button>` : ""}
        </div>` : ""}
        <div class="card-footer">
          ${gIcon}<span>Avaliação via Google</span>
        </div>
      </div>`;
  });
  h += "</div>";
  content.innerHTML = h;
}

function toggle(id, btn) {
  const el = document.getElementById(id);
  btn.textContent = el.classList.toggle("clamp") ? "Ler mais" : "Ler menos";
}

// ── Error ─────────────────────────────
function showError(msg, detail) {
  summarySection.style.display = "none";
  content.innerHTML = `
    <div class="msg-box">
      <div style="font-size:2rem;margin-bottom:.5rem">⚠️</div>
      <h2>Erro ao carregar</h2>
      <p>${msg}</p>
      ${detail ? `<pre>${detail}</pre>` : ""}
      <p style="margin-top:.5rem;font-size:.76rem">
        Pressione <strong>F12</strong> → aba <strong>Console</strong> para ver o erro técnico.
      </p>
      <button class="btn-back" onclick="goBack()">← Voltar e tentar novamente</button>
    </div>`;
}

function goBack() {
  summarySection.style.display = "none";
  showForm();
}

// ── Fetch ─────────────────────────────
function fetchAll(apiKey, locations) {
  showSkeleton();

  window.gm_authFailure = () =>
    showError("Falha de autenticação com o Google.", "gm_authFailure — chave inválida ou Maps JavaScript API não ativada.");

  const run = () => {
    const service = new google.maps.places.PlacesService($("map"));
    const results = new Array(locations.length).fill(null);
    let done = 0;

    locations.forEach((loc, idx) => {
      service.getDetails(
        { placeId: loc.placeId, fields: ["name","rating","user_ratings_total","reviews"] },
        (place, status) => {
          if (status === google.maps.places.PlacesServiceStatus.OK) {
            results[idx] = {
              ok: true,
              rating: place.rating || 0,
              totalRatings: place.user_ratings_total || 0,
              reviews: place.reviews || []
            };
          } else {
            results[idx] = { ok: false, error: `${loc.label}: ${status}` };
          }

          done++;
          if (done < locations.length) return;

          // All done — merge
          const good = results.filter(r => r.ok);
          if (!good.length) {
            showError("Nenhum local carregado.", results.map(r => r.error).join("\n"));
            return;
          }

          // Weighted average rating
          let sumRating = 0, sumCount = 0;
          good.forEach(r => { sumRating += r.rating * r.totalRatings; sumCount += r.totalRatings; });
          const weightedRating = sumCount > 0 ? sumRating / sumCount : 0;

          // Merge reviews, sort newest first
          const allReviews = good.flatMap(r => r.reviews)
            .sort((a, b) => (b.time || 0) - (a.time || 0));

          renderReviews(allReviews, weightedRating, sumCount);
        }
      );
    });
  };

  if (window.google && window.google.maps) { run(); return; }

  window._mapsReady = () => run();

  const old = document.getElementById("gscript");
  if (old) old.remove();

  const s = document.createElement("script");
  s.id  = "gscript";
  s.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=places&callback=_mapsReady`;
  s.onerror = () => showError(
    "Não foi possível carregar o script do Google.",
    "Verifique se a chave é válida ou se há restrição de domínio bloqueando o acesso."
  );
  document.head.appendChild(s);
}

// ── Form ──────────────────────────────
function showForm() {
  content.innerHTML = `
    <div class="msg-box">
      <div style="font-size:1.8rem;margin-bottom:.5rem">🏪</div>
      <h2>Configurar Widget</h2>
      <p>Preencha os dados abaixo para carregar todas as avaliações.</p>
      <div class="form-wrap">
        <label>🔑 Chave de API</label>
        <input id="inp-key" type="text" value="${CFG.apiKey}" placeholder="AIzaSy..."/>
        <p class="hint">Precisa ter <strong>Maps JavaScript API</strong> e <strong>Places API</strong> ativadas.</p>

        <label>📍 Place ID — Local 1</label>
        <input id="inp-p1" type="text" value="${CFG.locations[0].placeId}" placeholder="ChIJ..."/>

        <label>📍 Place ID — Local 2</label>
        <input id="inp-p2" type="text" value="${CFG.locations[1].placeId}" placeholder="ChIJ..."/>

        <button class="btn-primary" onclick="submitForm()">Carregar todas as avaliações →</button>
      </div>
    </div>`;
}

function submitForm() {
  const key = $("inp-key").value.trim();
  const p1  = $("inp-p1").value.trim();
  const p2  = $("inp-p2").value.trim();
  if (!key)       { alert("Informe a chave de API."); return; }
  if (!p1 || !p2) { alert("Informe os dois Place IDs."); return; }
  fetchAll(key, [
    { label: "Local 1", placeId: p1 },
    { label: "Local 2", placeId: p2 },
  ]);
}

// ── Boot ──────────────────────────────
showForm();
</script>
</body>
</html>
