<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avaliações</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #3B391E;
      --ink-soft: rgba(59,57,30,0.66);
      --ink-line: rgba(59,57,30,0.22);
      --gap: 88px;
      --pad-h: 64px;
    }

    html, body {
      background: transparent;
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    .widget { width: 100%; padding: 2.8rem var(--pad-h) 3rem; }

    @media (max-width: 700px) { :root { --pad-h: 28px; } }
    @media (max-width: 480px) { :root { --pad-h: 20px; } }

    .carousel-shell {
      position: relative;
      display: flex;
      align-items: stretch;
      gap: 0;
      width: 100%;
    }

    .arrow-btn {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: transparent;
      border: 1.5px solid rgba(59,57,30,0.85);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      font-size: 1.35rem;
      line-height: 1;
      transition: background .2s, opacity .2s;
      user-select: none;
      z-index: 10;
      margin: 0 12px;
      margin-top: 4px;
    }
    .arrow-btn:hover { background: rgba(59,57,30,0.12); }
    .arrow-btn.disabled { opacity: .22; pointer-events: none; }

    .carousel-viewport { flex: 1; min-width: 0; overflow: hidden; }

    .carousel-track {
      display: flex;
      gap: 0;
      transition: transform .44s cubic-bezier(.4,0,.2,1);
      will-change: transform;
      align-items: flex-start;
    }

    .review-card {
      flex: 0 0 auto;
      min-width: 0;
      background: transparent;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      padding: 0 calc(var(--gap) / 2);
    }
    .review-card:first-child { padding-left: 0; }
    .review-card + .review-card { border-left: 1px solid var(--ink-line); }

    .review-text {
      font-family: 'Libre Baskerville', serif;
      font-size: clamp(.92rem, 1.15vw, 1.04rem);
      line-height: 1.72;
      color: var(--ink);
      overflow-wrap: anywhere;
      word-break: normal;
      hyphens: auto;
    }

    .review-text::before { content: '\201C'; }
    .review-text::after { content: '\201D'; }

    .card-author {
      display: flex;
      align-items: center;
      gap: .85rem;
      min-width: 0;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      flex-shrink: 0;
      background: rgba(59,57,30,0.16);
      border: 1px solid rgba(59,57,30,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: .82rem;
      color: var(--ink);
      font-weight: 500;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    .author-details {
      display: flex;
      flex-direction: column;
      gap: .22rem;
      min-width: 0;
    }

    .author-name-row {
      display: flex;
      flex-direction: row;
      align-items: baseline;
      gap: .35rem;
      flex-wrap: wrap;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: .88rem;
      color: var(--ink);
      letter-spacing: .01em;
      min-width: 0;
    }

    .source-label-row {
      display: flex;
      align-items: center;
      gap: .35rem;
      min-width: 0;
    }

    .star-row { display: flex; gap: 2px; }
    .star-row .s { font-size: .72rem; color: rgba(59,57,30,0.82); }

    .source-label {
      font-family: 'Inter', sans-serif;
      font-size: .68rem;
      font-weight: 400;
      color: var(--ink-soft);
    }

    .source-label a {
      color: var(--ink-soft);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .source-label a:hover { color: var(--ink); }

    .widget.is-mobile { padding: 1.8rem var(--pad-h) 2.2rem; }
    .widget.is-mobile .carousel-shell { align-items: flex-start; }
    .widget.is-mobile .arrow-btn {
      width: 36px;
      height: 36px;
      font-size: 1.15rem;
      margin: 0 6px;
      margin-top: 2px;
    }
    .widget.is-mobile .review-card,
    .widget.is-mobile .review-card:first-child {
      padding-left: 0;
      padding-right: 0;
      border-left: none;
    }
    .widget.is-mobile .review-card + .review-card { border-left: none; }
    .widget.is-mobile .review-text {
      font-size: clamp(.96rem, 4.5vw, 1.1rem);
      line-height: 1.68;
    }
    .widget.is-mobile .card-author {
      align-items: center;
      gap: .75rem;
    }
    .widget.is-mobile .author-name-row {
      display: flex;
      flex-direction: column;
      gap: .15rem;
    }
    .widget.is-mobile .author-name-row .author-last-part {
      display: block;
      font-weight: 400;
      font-size: .75rem;
      color: var(--ink-soft);
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .widget.is-mobile .source-label-row {
      flex-direction: column;
      align-items: flex-start;
      gap: .18rem;
    }

    @media (max-width: 767px) {
      .widget { padding: 1.8rem var(--pad-h) 2.2rem; }
      .arrow-btn { width: 36px; height: 36px; font-size: 1.15rem; margin: 0 6px; margin-top: 2px; }
      .review-card,
      .review-card:first-child { padding-left: 0; padding-right: 0; }
      .review-card + .review-card { border-left: none; }
      .review-text { font-size: clamp(.96rem, 4.5vw, 1.1rem); line-height: 1.68; }
      .author-name-row { flex-direction: column; gap: .15rem; }
      .author-name-row .author-last-part {
        display: block;
        font-weight: 400;
        font-size: .75rem;
        color: var(--ink-soft);
        letter-spacing: .06em;
        text-transform: uppercase;
      }
      .source-label-row { flex-direction: column; align-items: flex-start; gap: .18rem; }
    }

    .skel-shell { display: flex; align-items: flex-start; gap: 12px; }
    .skel-arrow { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; }
    .skel-row { display: flex; gap: var(--gap); flex: 1; }
    .skel-card { flex: 1; padding: 0 0 1.4rem; }
    .sk {
      background: linear-gradient(90deg, rgba(59,57,30,.10) 25%, rgba(59,57,30,.18) 50%, rgba(59,57,30,.10) 75%);
      background-size: 200% 100%;
      animation: shim 1.4s infinite;
      border-radius: 5px;
    }
    @keyframes shim { to { background-position: -200% 0; } }
  </style>
</head>
<body>
<div class="widget" id="widget">
  <div id="content"></div>
</div>

<div id="map" style="display:none"></div>

<script>
const CFG = {
  apiKey: "AIzaSyBHJkUQN1gaLkH2HVXVW-V3WY6lTGJX7rs",
  locations: [
    { label: "Local 1", placeId: "ChIJM9FLeUXl3JQRIP4GrM3Iw1M", googleUrl: "https://maps.google.com/?cid=ChIJM9FLeUXl3JQRIP4GrM3Iw1M" },
    { label: "Local 2", placeId: "ChIJba89okrj3JQRbHFXw3unq24", googleUrl: "https://maps.google.com/?cid=ChIJba89okrj3JQRbHFXw3unq24" }
  ]
};

const MANUAL_REVIEWS = [
  {
    author_name: "Bruna Marina da Silva Almeida", rating: 5,
    text: "Conversar com Aline é como se estivesse conversando com uma amiga próxima, ela entende e compreende e com base nisso, ela fala o que você precisa. Demonstra que não existe nada melhor que cuidar de nós mesmos, não só passa dieta como me ensina também!!",
    source: "panel"
  },
  {
    author_name: "Cecília Campos Siqueira", rating: 5,
    text: "Aline é uma profissional excepcional, me ajudou a ajustar a alimentação à minha rotina e às minhas necessidades, ao mesmo tempo que me apresentou novos alimentos e opções. Os atendimentos são ótimos, leves e atenciosos. Têm feito muita diferença na minha saúde e disposição para manter a constância com uma boa alimentação, que eu consigo fazer rolar no meu dia a dia e realmente gostar! Muito obrigada, querida :)",
    source: "panel"
  },
  {
    author_name: "Ana Flavia Machado Muniz Andrade", rating: 5,
    text: "Muito atenciosa e gentil. Disposta a entender e ouvir as necessidades do paciente. Parabéns Aline!",
    source: "panel"
  },
  {
    author_name: "Thalita Oliveira", rating: 5,
    text: "Super atenciosa e cuidadosa! Verifica de fato suas necessidades e mais do que isso adapta as orientações de forma palpável ao que vc pode fazer. Isso facilita já que a grande maioria não verifica se de fato vc vai conseguir seguir as orientações! Estou amando trabalhar com ela!",
    source: "panel"
  },
  {
    author_name: "Karolina Candido Silva Ferrari", rating: 5,
    text: "Adorei a consulta, muito simpática, sabe ouvir e entender nosssa rotina.",
    source: "panel"
  },
  {
    author_name: "Elaine Magi Vieira Marquezini", rating: 5,
    text: "Atenciosa e com boa disposição para interação entre paciente e profissional!",
    source: "panel"
  },
  {
    author_name: "Anônimo", rating: 5,
    text: "Perfeita em tudo, atendendo além das expectativas!!",
    source: "panel"
  },
  {
    author_name: "Bruna Marina da Silva Almeida", rating: 5,
    text: "Mudou minha visão sobre o profissional da nutrição e pretendo seguir a risca cada dica e conselho!",
    source: "panel"
  },
  {
    author_name: "Cecília Campos Siqueira", rating: 5,
    text: "Muito querida e muito simpática, fez questão de conhecer meus hábitos e minha rotina para ajustar meu plano alimentar a isso, e não impor uma dieta que eu não daria conta de seguir no dia a dia. Tem várias dicas e receitas legais e vai sugerindo alimentos novos para experimentar sem forçar.",
    source: "panel"
  },
  {
    author_name: "Anônimo", rating: 5,
    text: "Adorei a abordagem da Aline, super querida, me ouviu bastante, entendeu minha realidade e adaptou tudo para seguirmos da melhor forma!",
    source: "panel"
  }
];

const $ = id => document.getElementById(id);
const SKIP = new Set(["de", "da", "do", "dos", "das", "e", "von", "van"]);
const DESKTOP_GAP = 32;
let currentIdx = 0;
let allCards = [];
let lastPerPage = 0;
let renderedReviews = [];

function getWidgetWidth() {
  const widget = $("widget");
  const content = $("content");
  const widthCandidates = [
    content?.clientWidth,
    widget?.clientWidth,
    document.documentElement.clientWidth,
    window.innerWidth
  ].filter(Boolean);
  return Math.min(...widthCandidates);
}

function getPerPage() {
  const width = getWidgetWidth();
  return width >= 1200 ? 3 : 1;
}

function getGap() {
  return getPerPage() > 1 ? DESKTOP_GAP : 0;
}

function syncLayoutClass() {
  const widget = $("widget");
  if (!widget) return;
  widget.classList.toggle("is-mobile", getPerPage() === 1);
}

function getInitials(name) {
  if (!name || name === "Anônimo") return "?";
  const parts = name.trim().split(/\s+/).filter(w => !SKIP.has(w.toLowerCase()));
  return ((parts[0]?.[0] || "") + (parts[parts.length - 1]?.[0] || "")).toUpperCase();
}

function getNameParts(name) {
  if (!name || name === "Anônimo") return { first: "Anônimo", last: "" };
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return { first: parts[0], last: "" };
  return {
    first: parts[0],
    last: parts.slice(1).map(w => w[0].toUpperCase() + ".").join(" ")
  };
}

function starsHTML() {
  return [1,2,3,4,5].map(() => `<span class="s">★</span>`).join("");
}

function showSkeleton() {
  syncLayoutClass();
  const n = getPerPage();
  let cards = "";
  for (let i = 0; i < n; i++) cards += `
    <div class="skel-card">
      <div class="sk" style="height:12px;width:92%;margin-bottom:9px"></div>
      <div class="sk" style="height:12px;width:80%;margin-bottom:9px"></div>
      <div class="sk" style="height:12px;width:64%;margin-bottom:28px"></div>
      <div style="display:flex;gap:.7rem;align-items:center">
        <div class="sk" style="width:46px;height:46px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1">
          <div class="sk" style="height:10px;width:50%;margin-bottom:8px"></div>
          <div class="sk" style="height:9px;width:38%"></div>
        </div>
      </div>
    </div>`;
  $("content").innerHTML = `
    <div class="skel-shell">
      <div class="sk skel-arrow"></div>
      <div class="skel-row">${cards}</div>
      <div class="sk skel-arrow"></div>
    </div>`;
}

function buildCard(r) {
  const isPanel = r.source === "panel";
  const { first, last } = getNameParts(r.author_name);
  const initials = getInitials(r.author_name);
  const avatarInner = r.profile_photo_url
    ? `<img src="${r.profile_photo_url}" alt="${first}">`
    : initials;
  const sourceText = isPanel
    ? "Avaliação via plataforma"
    : `<a href="${r._googleUrl || '#'}" target="_blank" rel="noopener">Avaliação no Google</a>`;
  const fullName = last ? `${first} <span class="author-last-part">${last}</span>` : first;

  return `
    <div class="review-card">
      <div class="review-text" lang="pt-BR">${r.text}</div>
      <div class="card-author">
        <div class="avatar">${avatarInner}</div>
        <div class="author-details">
          <span class="author-name-row">— ${fullName}</span>
          <span class="source-label-row">
            <span class="star-row">${starsHTML(r.rating)}</span>
            <span class="source-label">${sourceText}</span>
          </span>
        </div>
      </div>
    </div>`;
}

function renderCarousel(reviews) {
  renderedReviews = reviews;
  syncLayoutClass();
  lastPerPage = getPerPage();
  const track = reviews.map(buildCard).join("");
  $("content").innerHTML = `
    <div class="carousel-shell">
      <button class="arrow-btn" id="arrow-left" onclick="slide(-1)" aria-label="Avaliação anterior">&#8249;</button>
      <div class="carousel-viewport" id="viewport">
        <div class="carousel-track" id="track">${track}</div>
      </div>
      <button class="arrow-btn" id="arrow-right" onclick="slide(1)" aria-label="Próxima avaliação">&#8250;</button>
    </div>`;

  allCards = Array.from($("track").children);
  currentIdx = 0;
  sizeCards();
  updateArrows();
  initTouch($("viewport"));
}

function sizeCards() {
  syncLayoutClass();
  const track = $("track");
  if (!track || !allCards.length) return;
  const perPage = getPerPage();
  const gap = getGap();
  const viewW = track.parentElement.getBoundingClientRect().width;
  const cardW = perPage === 1 ? viewW : (viewW - gap * (perPage - 1)) / perPage;
  allCards.forEach(card => {
    card.style.width = Math.max(0, cardW) + "px";
    card.style.height = "";
  });
  applyTranslate();
}

function applyTranslate() {
  const track = $("track");
  if (!track || !allCards.length) return;
  const cardW = allCards[0].offsetWidth;
  track.style.transform = `translateX(-${currentIdx * (cardW + getGap())}px)`;
}

function updateArrows() {
  if (!allCards.length) return;
  const perPage = getPerPage();
  const maxIdx = Math.max(0, allCards.length - perPage);
  currentIdx = Math.min(currentIdx, maxIdx);
  $("arrow-left")?.classList.toggle("disabled", currentIdx === 0);
  $("arrow-right")?.classList.toggle("disabled", currentIdx >= maxIdx);
}

function slide(dir) {
  const perPage = getPerPage();
  const maxIdx = Math.max(0, allCards.length - perPage);
  currentIdx = Math.max(0, Math.min(currentIdx + dir, maxIdx));
  applyTranslate();
  updateArrows();
}

function initTouch(el) {
  if (!el || el.dataset.touchReady) return;
  el.dataset.touchReady = "1";
  let startX = 0;
  el.addEventListener("touchstart", e => { startX = e.touches[0].clientX; }, { passive: true });
  el.addEventListener("touchend", e => {
    const dx = startX - e.changedTouches[0].clientX;
    if (Math.abs(dx) > 40) slide(dx > 0 ? 1 : -1);
  }, { passive: true });
}

function refreshLayout() {
  const perPage = getPerPage();
  if (renderedReviews.length && perPage !== lastPerPage) {
    renderCarousel(renderedReviews);
    return;
  }
  currentIdx = 0;
  sizeCards();
  updateArrows();
}

window.addEventListener("resize", refreshLayout);
if (window.ResizeObserver) {
  new ResizeObserver(refreshLayout).observe($("widget"));
}

function mergeAndFilter(googleResults) {
  const googleRevs = googleResults
    .filter(r => r.ok)
    .flatMap(r => r.reviews
      .filter(rev => rev.rating === 5 && rev.text && rev.text.trim())
      .map(rev => ({ ...rev, source: "google", _googleUrl: r.googleUrl }))
    );
  return [...googleRevs, ...MANUAL_REVIEWS];
}

function fetchAll() {
  showSkeleton();
  window.gm_authFailure = () => { renderCarousel(MANUAL_REVIEWS); };

  const run = () => {
    const service = new google.maps.places.PlacesService($("map"));
    const results = new Array(CFG.locations.length).fill(null);
    let done = 0;

    CFG.locations.forEach((loc, idx) => {
      service.getDetails(
        { placeId: loc.placeId, fields: ["reviews"] },
        (place, status) => {
          results[idx] = status === google.maps.places.PlacesServiceStatus.OK
            ? { ok: true, reviews: place.reviews || [], googleUrl: loc.googleUrl }
            : { ok: false, reviews: [], googleUrl: loc.googleUrl };

          if (++done === CFG.locations.length) {
            renderCarousel(mergeAndFilter(results));
          }
        }
      );
    });
  };

  if (window.google && window.google.maps) { run(); return; }
  window._mapsReady = run;

  const old = document.getElementById("gscript");
  if (old) old.remove();
  const script = document.createElement("script");
  script.id = "gscript";
  script.src = `https://maps.googleapis.com/maps/api/js?key=${CFG.apiKey}&libraries=places&callback=_mapsReady`;
  script.onerror = () => { renderCarousel(MANUAL_REVIEWS); };
  document.head.appendChild(script);
}

fetchAll();
</script>
</body>
</html>
