<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avaliações</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --ink: #3B391E;
      --ink-soft: rgba(59, 57, 30, .66);
      --ink-line: rgba(59, 57, 30, .22);
      --pad-x: clamp(10px, 3.6vw, 22px);
      --arrow: 28px;
      --nav-gap: clamp(14px, 4vw, 22px);
    }
    html, body {
      width: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      color: var(--ink);
      font-family: Inter, sans-serif;
      overflow-x: hidden;
    }
    .widget { width: 100%; max-width: 100%; padding: 18px var(--pad-x) 22px; background: transparent; }
    .carousel-shell {
      width: 100%;
      display: grid;
      grid-template-columns: var(--arrow) minmax(0, 1fr) var(--arrow);
      align-items: center;
      gap: var(--nav-gap);
    }
    .arrow-btn {
      width: var(--arrow);
      height: var(--arrow);
      border-radius: 999px;
      border: 1.25px solid rgba(59, 57, 30, .78);
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      align-self: center;
      font-size: .92rem;
      line-height: 1;
      padding: 0;
      transition: background .2s, opacity .2s;
    }
    .arrow-btn:hover { background: rgba(59, 57, 30, .1); }
    .arrow-btn.disabled { opacity: .22; pointer-events: none; }
    .carousel-viewport { min-width: 0; overflow: hidden; touch-action: pan-y; }
    .carousel-track {
      display: flex;
      align-items: flex-start;
      gap: 0;
      transition: transform .38s cubic-bezier(.4, 0, .2, 1);
      will-change: transform;
      touch-action: pan-y;
    }
    .review-card {
      flex: 0 0 auto;
      min-width: 0;
      background: transparent;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 0;
    }
    .review-text {
      margin: 0;
      color: var(--ink);
      font-family: 'Libre Baskerville', serif;
      font-size: clamp(12.8px, 3.45vw, 13.8px);
      line-height: 1.58;
      font-weight: 400;
      overflow-wrap: normal;
      word-break: normal;
      hyphens: none;
    }
    .review-text::before { content: '\201C'; }
    .review-text::after { content: '\201D'; }
    .review-text.is-clamped {
      display: -webkit-box;
      -webkit-line-clamp: 7;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .read-more {
      width: max-content;
      margin-top: -7px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      font-family: Inter, sans-serif;
      font-size: 11px;
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .card-author { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      flex: 0 0 auto;
      background: rgba(59, 57, 30, .14);
      border: 1px solid rgba(59, 57, 30, .34);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9.5px;
      font-weight: 600;
      overflow: hidden;
    }
    .author-details { min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .author-name-row { color: var(--ink); font-size: 12.5px; line-height: 1.2; font-weight: 600; display: block; }
    .source-label-row { display: flex; align-items: center; flex-wrap: wrap; gap: 4px 7px; }
    .star-row { display: flex; gap: 1px; }
    .star-row .s { color: rgba(59, 57, 30, .82); font-size: 10.5px; line-height: 1; }
    .source-label, .source-label a { color: var(--ink-soft); font-size: 10.5px; line-height: 1.2; }
    .source-label a { text-decoration: underline; text-underline-offset: 2px; }

    @media (min-width: 760px) {
      :root { --pad-x: 48px; --arrow: 38px; --nav-gap: 18px; }
      .widget { padding-top: 34px; padding-bottom: 38px; }
      .carousel-shell { display: flex; align-items: center; gap: 0; }
      .arrow-btn { flex: 0 0 auto; width: 38px; height: 38px; margin: 0 18px; font-size: 1.22rem; }
      .carousel-viewport { flex: 1; }
      .review-card { gap: 22px; padding: 0 44px; }
      .review-card:first-child { padding-left: 0; }
      .review-card + .review-card { border-left: 1px solid var(--ink-line); }
      .review-text { font-size: clamp(14px, 1.1vw, 16px); line-height: 1.72; }
      .review-text.is-clamped { display: block; overflow: visible; }
      .read-more { display: none; }
      .avatar { width: 40px; height: 40px; font-size: 12px; }
      .author-name-row { font-size: 14px; }
      .star-row .s { font-size: 11.5px; }
      .source-label, .source-label a { font-size: 11px; }
    }
  </style>
</head>
<body>
<div class="widget" id="widget"><div id="content"></div></div>
<script>
const GOOGLE_PROFILES = [
  "https://share.google/ogMIYW8WqEn9OXDlb",
  "https://share.google/qUKYIII7ttWxf7OEA"
];

const REVIEWS = [
  { author_name: "Bruna Marina da Silva Almeida", rating: 5, googleUrl: GOOGLE_PROFILES[0], text: "Conversar com Aline é como se estivesse conversando com uma amiga próxima, ela entende e compreende e com base nisso, ela fala o que você precisa. Demonstra que não existe nada melhor que cuidar de nós mesmos, não só passa dieta como me ensina também!!" },
  { author_name: "Cecília Campos Siqueira", rating: 5, googleUrl: GOOGLE_PROFILES[0], text: "Aline é uma profissional excepcional, me ajudou a ajustar a alimentação à minha rotina e às minhas necessidades, ao mesmo tempo que me apresentou novos alimentos e opções. Os atendimentos são ótimos, leves e atenciosos. Têm feito muita diferença na minha saúde e disposição para manter a constância com uma boa alimentação, que eu consigo fazer rolar no meu dia a dia e realmente gostar! Muito obrigada, querida :)" },
  { author_name: "Ana Flavia Machado Muniz Andrade", rating: 5, googleUrl: GOOGLE_PROFILES[0], text: "Muito atenciosa e gentil. Disposta a entender e ouvir as necessidades do paciente. Parabéns Aline!" },
  { author_name: "Thalita Oliveira", rating: 5, googleUrl: GOOGLE_PROFILES[1], text: "Super atenciosa e cuidadosa! Verifica de fato suas necessidades e mais do que isso adapta as orientações de forma palpável ao que vc pode fazer. Isso facilita já que a grande maioria não verifica se de fato vc vai conseguir seguir as orientações! Estou amando trabalhar com ela!" },
  { author_name: "Karolina Candido Silva Ferrari", rating: 5, googleUrl: GOOGLE_PROFILES[1], text: "Adorei a consulta, muito simpática, sabe ouvir e entender nosssa rotina." },
  { author_name: "Elaine Magi Vieira Marquezini", rating: 5, googleUrl: GOOGLE_PROFILES[1], text: "Atenciosa e com boa disposição para interação entre paciente e profissional!" },
  { author_name: "Anônimo", rating: 5, googleUrl: GOOGLE_PROFILES[0], text: "Perfeita em tudo, atendendo além das expectativas!!" },
  { author_name: "Bruna Marina da Silva Almeida", rating: 5, googleUrl: GOOGLE_PROFILES[0], text: "Mudou minha visão sobre o profissional da nutrição e pretendo seguir a risca cada dica e conselho!" },
  { author_name: "Cecília Campos Siqueira", rating: 5, googleUrl: GOOGLE_PROFILES[0], text: "Muito querida e muito simpática, fez questão de conhecer meus hábitos e minha rotina para ajustar meu plano alimentar a isso, e não impor uma dieta que eu não daria conta de seguir no dia a dia. Tem várias dicas e receitas legais e vai sugerindo alimentos novos para experimentar sem forçar." },
  { author_name: "Anônimo", rating: 5, googleUrl: GOOGLE_PROFILES[1], text: "Adorei a abordagem da Aline, super querida, me ouviu bastante, entendeu minha realidade e adaptou tudo para seguirmos da melhor forma!" }
];

const $ = id => document.getElementById(id);
const SKIP = new Set(["de", "da", "do", "dos", "das", "e", "von", "van"]);
let currentIdx = 0;
let allCards = [];
let lastPerPage = 1;
function viewportWidth() {
  const content = $("content");
  const widget = $("widget");
  return Math.min(...[content?.clientWidth, widget?.clientWidth, document.documentElement.clientWidth, window.innerWidth].filter(Boolean));
}
function perPage() { return viewportWidth() >= 980 ? 3 : 1; }
function gap() { return perPage() > 1 ? 32 : 0; }
function initials(name) {
  if (!name || name === "Anônimo") return "?";
  const parts = name.trim().split(/\s+/).filter(w => !SKIP.has(w.toLowerCase()));
  return ((parts[0]?.[0] || "") + (parts[parts.length - 1]?.[0] || "")).toUpperCase();
}
function displayName(name) {
  if (!name || name === "Anônimo") return "Anônimo";
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0];
  return `${parts[0]} ${parts.slice(1).map(w => w[0].toUpperCase() + ".").join(" ")}`;
}
function stars() { return [1,2,3,4,5].map(() => '<span class="s">★</span>').join(''); }
function card(review, index) {
  const name = displayName(review.author_name);
  const source = `<a href="${review.googleUrl}" target="_blank" rel="noopener">Avaliação via Google</a>`;
  const clamp = review.text.length > 180 ? ' is-clamped' : '';
  const more = review.text.length > 180 ? `<button class="read-more" type="button" onclick="toggleReview(${index}, this)">Ver mais</button>` : '';
  return `<article class="review-card">
    <p class="review-text${clamp}" id="review-${index}" lang="pt-BR">${review.text}</p>
    ${more}
    <div class="card-author"><div class="avatar">${initials(review.author_name)}</div><div class="author-details"><div class="author-name-row">— ${name}</div><div class="source-label-row"><span class="star-row">${stars()}</span><span class="source-label">${source}</span></div></div></div>
  </article>`;
}
function render() {
  lastPerPage = perPage();
  currentIdx = 0;
  $("content").innerHTML = `<div class="carousel-shell"><button class="arrow-btn" id="arrow-left" onclick="slide(-1)" aria-label="Avaliação anterior">&#8249;</button><div class="carousel-viewport" id="viewport"><div class="carousel-track" id="track">${REVIEWS.map(card).join('')}</div></div><button class="arrow-btn" id="arrow-right" onclick="slide(1)" aria-label="Próxima avaliação">&#8250;</button></div>`;
  allCards = Array.from($("track").children);
  sizeCards();
  updateArrows();
  initTouch($("viewport"));
}
function sizeCards() {
  const track = $("track");
  if (!track || !allCards.length) return;
  const pp = perPage();
  const viewW = track.parentElement.getBoundingClientRect().width;
  const w = pp === 1 ? viewW : (viewW - gap() * (pp - 1)) / pp;
  allCards.forEach(c => { c.style.width = Math.max(0, w) + "px"; });
  applyTranslate();
}
function applyTranslate() {
  const track = $("track");
  if (!track || !allCards.length) return;
  track.style.transform = `translateX(-${currentIdx * (allCards[0].offsetWidth + gap())}px)`;
}
function updateArrows() {
  if (!allCards.length) return;
  const maxIdx = Math.max(0, allCards.length - perPage());
  currentIdx = Math.min(currentIdx, maxIdx);
  $("arrow-left")?.classList.toggle("disabled", currentIdx === 0);
  $("arrow-right")?.classList.toggle("disabled", currentIdx >= maxIdx);
}
function slide(dir) {
  const maxIdx = Math.max(0, allCards.length - perPage());
  currentIdx = Math.max(0, Math.min(currentIdx + dir, maxIdx));
  applyTranslate();
  updateArrows();
}
function toggleReview(index, btn) {
  const el = $("review-" + index);
  const clamped = el.classList.toggle("is-clamped");
  btn.textContent = clamped ? "Ver mais" : "Ver menos";
}
function initTouch(el) {
  if (!el || el.dataset.touchReady) return;
  el.dataset.touchReady = "1";
  let startX = 0;
  let startY = 0;
  el.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  el.addEventListener("touchend", e => {
    const dx = startX - e.changedTouches[0].clientX;
    const dy = startY - e.changedTouches[0].clientY;
    if (Math.abs(dx) > 38 && Math.abs(dx) > Math.abs(dy)) slide(dx > 0 ? 1 : -1);
  }, { passive: true });
}
function refresh() {
  if (perPage() !== lastPerPage) return render();
  currentIdx = 0;
  sizeCards();
  updateArrows();
}
window.addEventListener("resize", refresh);
if (window.ResizeObserver) new ResizeObserver(refresh).observe($("widget"));
render();
</script>
</body>
</html>
