<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avaliações</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --ink: #3B391E;
      --ink-soft: rgba(59, 57, 30, .66);
      --ink-line: rgba(59, 57, 30, .22);
      --pad-x: clamp(14px, 5vw, 20px);
      --arrow: 30px;
      --nav-gap: clamp(24px, 7vw, 34px);
      --page-gap: 0px;
      --mobile-stage: clamp(390px, 72vh, 520px);
    }
    html, body {
      width: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      color: var(--ink);
      font-family: Inter, sans-serif;
      overflow-x: hidden;
    }
    body { -webkit-text-size-adjust: 100%; }
    .widget {
      width: 100%;
      max-width: 100%;
      padding: clamp(18px, 5vh, 32px) var(--pad-x) clamp(40px, 9vh, 70px);
      background: transparent;
    }
    .carousel-shell {
      width: 100%;
      min-height: var(--mobile-stage);
      display: grid;
      grid-template-columns: var(--arrow) minmax(0, 1fr) var(--arrow);
      align-items: center;
      gap: var(--nav-gap);
    }
    .arrow-btn {
      width: var(--arrow);
      height: var(--arrow);
      border-radius: 999px;
      border: 1.25px solid rgba(59, 57, 30, .78);
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      align-self: center;
      font-size: .92rem;
      line-height: 1;
      padding: 0;
      transition: background .2s, opacity .2s;
    }
    .arrow-btn:hover { background: rgba(59, 57, 30, .1); }
    .arrow-btn.disabled { opacity: .22; pointer-events: none; }
    .carousel-viewport {
      min-width: 0;
      overflow: hidden;
      touch-action: pan-y;
    }
    .carousel-track {
      display: flex;
      align-items: stretch;
      transition: transform .38s cubic-bezier(.4, 0, .2, 1);
      will-change: transform;
    }
    .review-page {
      flex: 0 0 auto;
      min-width: 0;
      min-height: var(--mobile-stage);
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: center;
      gap: 22px;
    }
    .review-card {
      position: relative;
      min-width: 0;
      background: transparent;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      padding: 0;
    }
    .review-text {
      margin: 0;
      color: var(--ink);
      font-family: Inter, sans-serif;
      font-size: clamp(12.8px, 3.45vw, 13.8px);
      line-height: 1.56;
      font-weight: 400;
      overflow-wrap: break-word;
      word-break: normal;
      hyphens: none;
      -webkit-hyphens: none;
    }
    .review-text::before { content: '\201C'; }
    .review-text::after { content: '\201D'; }
    .review-text.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 15;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .read-more-btn {
      display: none;
      width: fit-content;
      margin-top: -10px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--ink);
      font-family: Inter, sans-serif;
      font-size: 11px;
      line-height: 1.2;
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 2px;
      cursor: pointer;
    }
    .read-more-btn.is-visible { display: inline-block; }
    .card-author {
      min-width: 0;
      display: flex;
      align-items: flex-start;
    }
    .author-details {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .author-name-row {
      color: var(--ink);
      font-size: 12.5px;
      line-height: 1.2;
      font-weight: 600;
      display: block;
    }
    .source-label-row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
    .star-row { display: flex; gap: 1px; }
    .star-row .s {
      color: rgba(59, 57, 30, .82);
      font-size: 10.5px;
      line-height: 1;
    }
    .source-label,
    .source-label a {
      color: var(--ink-soft);
      font-size: 10.5px;
      line-height: 1.2;
    }
    .source-label a {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    @media (min-width: 768px) {
      :root {
        --pad-x: 58px;
        --arrow: 38px;
        --nav-gap: 0px;
        --page-gap: 96px;
        --mobile-stage: auto;
      }
      .widget { padding-top: 34px; padding-bottom: 42px; }
      .carousel-shell {
        min-height: 0;
        display: flex;
        align-items: center;
      }
      .arrow-btn {
        flex: 0 0 auto;
        width: 38px;
        height: 38px;
        margin: 0 32px;
        font-size: 1.22rem;
      }
      .carousel-viewport { flex: 1; }
      .review-page {
        min-height: 0;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        column-gap: var(--page-gap);
        row-gap: 0;
        align-items: start;
      }
      .review-card {
        justify-content: flex-start;
        gap: 22px;
      }
      .review-card:not(:first-child)::before {
        content: "";
        position: absolute;
        left: calc(var(--page-gap) / -2);
        top: 0;
        bottom: 0;
        width: 1px;
        background: var(--ink-line);
      }
      .review-text {
        font-size: clamp(13.5px, .95vw, 15px);
        line-height: 1.55;
      }
      .author-name-row { font-size: 14px; }
      .star-row .s { font-size: 11.5px; }
      .source-label, .source-label a { font-size: 11px; }
    }
  </style>
</head>
<body>
<section class="widget" id="widget" itemscope itemtype="https://schema.org/LocalBusiness">

  <div id="content"></div>

<script>

  { author_name: "Bruna Marina da Silva Almeida", rating: 5, text: `Conversar com Aline é como se estivesse conversando com uma amiga próxima, ela entende e compreende e com base nisso, ela fala o que você precisa. Demonstra que não existe nada melhor que cuidar de nós mesmos, não só passa dieta como me ensina também!!`, source: "platform" },
  { author_name: "Cecília Campos Siqueira", rating: 5, text: `Aline é uma profissional excepcional, me ajudou a ajustar a alimentação à minha rotina e às minhas necessidades, ao mesmo tempo que me apresentou novos alimentos e opções. Os atendimentos são ótimos, leves e atenciosos. Têm feito muita diferença na minha saúde e disposição para manter a constância com uma boa alimentação, que eu consigo fazer rolar no meu dia a dia e realmente gostar! Muito obrigada, querida :)`, source: "platform" },

const GOOGLE_REVIEWS = [
  { author_name: "Clara De Oliveira", rating: 5, text: `Que consulta incrível!!! Busquei por cuidar da minha seletividade alimentar e nunca pensei que encontraria exatamente o que eu precisava!! Ótima profissional`, source: "google", sourceUrl: GOOGLE_2 },
  { author_name: "Waldirene Caban", rating: 5, text: `Atendimento de qualidade, tive todas as respostas que precisava ouvir. Dra. Aline é uma excelente profissional, domina o assunto além de ter muito amor pela sua profissão. Ótima localização, um ambiente aconchegante e agradável, onde me senti muito a vontade para falar de minhas queixas. Super indico.`, source: "google", sourceUrl: GOOGLE_2 },
  { author_name: "Marina Brandão", rating: 5, text: `Profissional extremamente humanizada e atualizada! O atendimento foi acolhedor e totalmente personalizado para a minha rotina e meu jeito de ser. Senti-me ouvida de verdade, o que fez toda a diferença no processo. Recomendo a todos que desejam se conhecer melhor e compreender como a alimentação pode ser transformadora, curativa e restauradora.`, source: "google", sourceUrl: GOOGLE_2 },
  { author_name: "Isa Reda", rating: 5, text: `Profissional maravilhosa!! Super atenciosa e dedicada, perfeita no que faz, indico muito, melhor nutri de todas`, source: "google", sourceUrl: GOOGLE_2 },
  { author_name: "Bruna Alecrim", rating: 5, text: `Profissional muito atenciosa! Tenho problemas com seletividade alimentar desde os 6 anos e não consegui evoluir quase nada nesse aspecto até hoje (28 anos). Com a ajuda da Aline passei a conseguir me permitir experimentar novos alimentos e ampliar meu leque alimentar. Tem sido muito especial. É uma profissional que te escuta ativamente, entende suas dores e sua rotina, faz o processo alimentar ser mais leve. Sempre me senti a vontade para me abrir quanto às minhas questões de seletividade com ela e a mesma sempre foi muito compreensiva, sem julgamentos. É uma benção encontrar uma profissional deste nível! Obrigada, Aline!`, source: "google", sourceUrl: GOOGLE_2 },
  { author_name: "Sara Lamoglia", rating: 5, text: `Fiz uma consulta e vou voltar! Doutora Aline é muito querida, animada e dedicada, o que faz toda a diferença. Recomendo para quem quer abordagem comportamental!`, source: "google", sourceUrl: GOOGLE_2 },
  { author_name: "Bianca Recevich", rating: 5, text: `Muito atenciosa e precisa. Faz com que tudo se encaixe na rotina e seja do gosto do paciente, tudo muito simples e pratico. É racional, pensa na parte financeira para que o alimentação, suplementos não seja extremamente cara e você consiga manter.`, source: "google", sourceUrl: GOOGLE_2 },
  { author_name: "Tatiane S.O.", rating: 5, text: `Profissional muito atenciosa e capacitada.`, source: "google", sourceUrl: GOOGLE_2 },
  { author_name: "Malu Nasciutti", rating: 5, text: `Excelente. Atendimento diferenciado com uma abordagem mais pessoal e individualizada, que foca nas questões particulares de cada paciente, sem dietas padronizadas.`, source: "google", sourceUrl: GOOGLE_1 },
  { author_name: "Luiandre Nadalete", rating: 5, text: `Fico até sem comentários pra elogiar uma excelente profissional como essa. Depois de quase 3 anos lidando com a seletividade alimentar de uma criança de 4 anos, após a primeira consulta, os primeiros direcionamentos dado pela Drª Aline, tivemos resultado no primeiro dia com a minha filha comendo salada, feijão, brócolis... coisa que não imaginaríamos ela aceitar tão cedo, parecia uma mágica, mas não, foi técnicas ensinadas pela Drª, explicações de como saber lidar, se como agir, do que fazer, porque só quem passa por isso sabe como ficamos sem rumo, preocupados e culpados pela alimentação da criança. Enfim, só tenho a agradecer imensamente por primeiro nos tranquilizar em relação à situação, e depois nos guiar nessa caminhada que não é fácil. Obrigada Drª Aline, pelo seu excelente trabalho`, source: "google", sourceUrl: GOOGLE_1 },
  { author_name: "Isadora Schiefler", rating: 5, text: `A Aline tem um nível altíssimo de diferenciação e excelência. Ela vai muito além de uma dieta pronta. Ela entende você, sua rotina, seus gostos, seus problemas e procura adaptar tudo para a gente. E consegue demais! Posso dizer que já tive umas 05 nutris, mas com certeza a Aline é minha preferida! Recomendo muito!`, source: "google", sourceUrl: GOOGLE_1 },
  { author_name: "Agatha Carnevale", rating: 5, text: `Ótimo atendimento! Aline é muito atenciosa e faz com que você se sinta confortável em compartilhar durante a sessão, permitindo que seja aproveitada ao máximo. Além de possuir muito conhecimento e passar segurança ao paciente.`, source: "google", sourceUrl: GOOGLE_1 },
  { author_name: "Hellyn Kerecz Borim", rating: 5, text: `Por fazer acompanhamento nutricional desde a infância, posso dizer que a Aline tem uma abordagem técnica bastante interessante, diferente do que vi e vivi até hoje! A nutri é querida, acolhedora, respeitosa e atenciosa.`, source: "google", sourceUrl: GOOGLE_1 },
  { author_name: "Camily Pereira", rating: 5, text: `A doutora Aline é maravilhosa!!! Durante todas as consultas, ela me guiou pela mão e me fez entender que é possível viver o processo mesmo que seja difícil. Ela tornou tudo mais fácil, me auxiliando e proporcionando materiais para utilizar no dia a dia. Ela virou um novo divertidamente na minha cabeça!!! A cada refeição desafiadora, a voz dela e nossas conversas aparecem como um lembrete de que não estou sozinha e que sou capaz`, source: "google", sourceUrl: GOOGLE_1 },
  { author_name: "Carolina Camille", rating: 5, text: `Amei a consulta que tive com a Aline!! Me identifiquei com a abordagem que ela utiliza na nutrição e todo atendimento foi regado com todo acolhimento, compreensão das minhas necessidades, cuidado com a alimentação e acompanhamento de perto. Recomendo a todos que estão em busca de iniciar uma jornada de pazes com a alimentação!!`, source: "google", sourceUrl: GOOGLE_1 },
  { author_name: "Bruna Alecrim", rating: 5, text: `A Aline é uma profissional que realmente se importa com seus pacientes. Ela é ética e busca sempre os melhores caminhos para ajudar com as questões alimentares. A gente se sente a vontade para expor nossas vulnerabilidades. Indico de olhos fechados! Maravilhosa!`, source: "google", sourceUrl: GOOGLE_1 },
  { author_name: "Sofia Pacheco", rating: 5, text: `A Aline foi uma benção da minha vida. Além de ser minha nutricionista e ajudar com todas as questões alimentares e dúvidas que sempre tive, ela virou uma conselheira e amiga. Me senti à vontade para contar para ela sobre tudo o que já passei em relação a dietas, restrições e situações difíceis com alimentos na minha vida. Antes de passar qualquer tipo de plano e indicações, ela quis cuidar de mim e entender oq se passa na minha cabeça. Um carinho, cuidado e presença sem igual. Sempre me mandando mensagem, perguntando como estou me sentindo em relação ao que é passado na consulta, dicas para todas as áreas da minha vida. Tem sido uma experiência maravilhosa ter esse acompanhamento com uma pessoa e profissional maravilhosa! Recomendo para todos que posso.`, source: "google", sourceUrl: GOOGLE_1 }
];

const REVIEWS = [
  GOOGLE_REVIEWS[0],
  GOOGLE_REVIEWS[13],
  PLATFORM_REVIEWS[0],
  PLATFORM_REVIEWS[1],
  PLATFORM_REVIEWS[3],
  GOOGLE_REVIEWS[4],
  PLATFORM_REVIEWS[7],
  GOOGLE_REVIEWS[10],
  GOOGLE_REVIEWS[6],
  GOOGLE_REVIEWS[9],
  GOOGLE_REVIEWS[11],
  GOOGLE_REVIEWS[12],
  PLATFORM_REVIEWS[8],
  PLATFORM_REVIEWS[6],
  GOOGLE_REVIEWS[16],
  GOOGLE_REVIEWS[1],
  GOOGLE_REVIEWS[8],
  PLATFORM_REVIEWS[2],
  GOOGLE_REVIEWS[5],
  PLATFORM_REVIEWS[9],
  GOOGLE_REVIEWS[7],
  GOOGLE_REVIEWS[14],
  GOOGLE_REVIEWS[15],
  PLATFORM_REVIEWS[4],
  GOOGLE_REVIEWS[3],
  PLATFORM_REVIEWS[5],
  GOOGLE_REVIEWS[2]
].filter(Boolean);

const $ = id => document.getElementById(id);
let currentPage = 0;
let pages = [];
let lastPerPage = 0;

function viewportWidth() {
  const viewport = $("viewport");
  const content = $("content");
  const widget = $("widget");
  return Math.min(...[viewport?.clientWidth, content?.clientWidth, widget?.clientWidth, document.documentElement.clientWidth, window.innerWidth].filter(Boolean));
}
function perPage() { return viewportWidth() >= 768 ? 3 : 1; }
function chunk(items, size) {
  const chunks = [];
  for (let i = 0; i < items.length; i += size) chunks.push(items.slice(i, i + size));
  return chunks;
}
function displayName(review) {
  const name = review.author_name || "Anônimo";
  if (name === "Anônimo") return name;
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0];
  return `${parts[0]} ${parts.slice(1).map(w => w[0].toUpperCase() + ".").join(" ")}`;
}
function stars() { return [1,2,3,4,5].map(() => '<span class="s">&#9733;</span>').join(''); }
function escapeHTML(value) {
  return String(value || "").replace(/[&<>"]/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[char]));
}
function sourceHTML(review) {
  if (review.source === "google") {
    return "Avaliação via Google";
  }
  return "Avaliação via plataforma";
}
function card(review) {
  const name = displayName(review);
  return `<article class="review-card" itemprop="review" itemscope itemtype="https://schema.org/Review">
    <meta itemprop="itemReviewed" content="Aline Angela Nutricionista Comportamental">
    <p class="review-text collapsed" lang="pt-BR" itemprop="reviewBody">${escapeHTML(review.text)}</p>
    <button class="read-more-btn" type="button" onclick="toggleReadMore(this)">Continuar lendo</button>
    <div class="card-author">
      <div class="author-details">
        <div class="author-name-row" itemprop="author" itemscope itemtype="https://schema.org/Person"><span itemprop="name">&mdash; ${escapeHTML(name)}</span></div>
        <div class="source-label-row">
          <span class="star-row" aria-label="5 de 5 estrelas">${stars()}</span>
          <span class="source-label">${sourceHTML(review)}</span>
        </div>
        <span itemprop="reviewRating" itemscope itemtype="https://schema.org/Rating">
          <meta itemprop="ratingValue" content="5"><meta itemprop="bestRating" content="5">
        </span>
      </div>
    </div>
  </article>`;
}

function toggleReadMore(button) {
  const text = button.previousElementSibling;
  const collapsed = text.classList.toggle("collapsed");
  button.textContent = collapsed ? "Continuar lendo" : "Mostrar menos";
  sizePages();
}
function updateReadMoreButtons() {
  document.querySelectorAll(".read-more-btn").forEach(button => {
    const text = button.previousElementSibling;
    text.classList.add("collapsed");
    button.textContent = "Continuar lendo";
    button.classList.remove("is-visible");
    requestAnimationFrame(() => {
      const shouldShow = text.scrollHeight > text.clientHeight + 2;
      button.classList.toggle("is-visible", shouldShow);
    });
  });
}

function render() {
  const pp = perPage();
  lastPerPage = pp;
  currentPage = 0;
  const reviewPages = chunk(REVIEWS, pp);
  $("content").innerHTML = `<div class="carousel-shell">
    <button class="arrow-btn" id="arrow-left" onclick="slide(-1)" aria-label="Avaliação anterior">&#8249;</button>
    <div class="carousel-viewport" id="viewport"><div class="carousel-track" id="track">${reviewPages.map(page => `<div class="review-page">${page.map(card).join('')}</div>`).join('')}</div></div>
    <button class="arrow-btn" id="arrow-right" onclick="slide(1)" aria-label="Próxima avaliação">&#8250;</button>
  </div>`;
  pages = Array.from(document.querySelectorAll(".review-page"));
  sizePages();
  updateArrows();
  initTouch($("viewport"));
  updateReadMoreButtons();
}
function sizePages() {
  const viewport = $("viewport");
  if (!viewport || !pages.length) return;
  const width = viewport.getBoundingClientRect().width;
  pages.forEach(page => { page.style.width = Math.max(0, width) + "px"; });
  applyTranslate();
}
function applyTranslate() {
  const track = $("track");
  const viewport = $("viewport");
  if (!track || !viewport) return;
  const width = viewport.getBoundingClientRect().width;
  track.style.transform = `translateX(-${currentPage * width}px)`;
}
function updateArrows() {
  const maxPage = Math.max(0, pages.length - 1);
  currentPage = Math.max(0, Math.min(currentPage, maxPage));
  $("arrow-left")?.classList.toggle("disabled", currentPage === 0);
  $("arrow-right")?.classList.toggle("disabled", currentPage >= maxPage);
}
function slide(dir) {
  const maxPage = Math.max(0, pages.length - 1);
  currentPage = Math.max(0, Math.min(currentPage + dir, maxPage));
  applyTranslate();
  updateArrows();
  updateReadMoreButtons();
}
function initTouch(el) {
  if (!el || el.dataset.touchReady) return;
  el.dataset.touchReady = "1";
  let startX = 0;
  let startY = 0;
  el.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  el.addEventListener("touchend", e => {
    const dx = startX - e.changedTouches[0].clientX;
    const dy = startY - e.changedTouches[0].clientY;
    if (Math.abs(dx) > 38 && Math.abs(dx) > Math.abs(dy)) slide(dx > 0 ? 1 : -1);
  }, { passive: true });
}
function refresh() {
  const pp = perPage();
  if (pp !== lastPerPage) {
    render();
    return;
  }
  sizePages();
  updateArrows();
}
window.addEventListener("resize", refresh);
if (window.ResizeObserver) new ResizeObserver(refresh).observe($("widget"));
render();
</script>
</body>
</html>
