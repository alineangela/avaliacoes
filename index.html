<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avaliações</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --ink: #3B391E;
      --ink-soft: rgba(59, 57, 30, .66);
      --ink-line: rgba(59, 57, 30, .22);
      --pad-x: clamp(18px, 6vw, 24px);
      --arrow: 30px;
      --page-gap: 0px;
    }
    html, body {
      width: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      color: var(--ink);
      font-family: Inter, sans-serif;
      overflow-x: hidden;
    }
    body { -webkit-text-size-adjust: 100%; }
    .widget {
      width: 100%;
      max-width: 100%;
      padding: clamp(16px, 4vh, 28px) var(--pad-x) clamp(24px, 5vh, 36px);
      background: transparent;
    }
    .carousel-shell {
      width: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: var(--arrow) minmax(36px, 1fr) var(--arrow);
      grid-template-areas:
        "viewport viewport viewport"
        "left line right";
      align-items: center;
      column-gap: clamp(10px, 4vw, 18px);
      row-gap: clamp(16px, 4vw, 22px);
    }
    .carousel-shell::before {
      content: "";
      grid-area: line;
      width: 100%;
      height: 1px;
      background: rgba(59, 57, 30, .5);
    }
    .arrow-btn {
      width: var(--arrow);
      height: var(--arrow);
      border-radius: 999px;
      border: 1.25px solid rgba(59, 57, 30, .78);
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      align-self: center;
      font-size: .92rem;
      line-height: 1;
      padding: 0;
      transition: background .2s, opacity .2s;
    }
    #arrow-left { grid-area: left; }
    #arrow-right { grid-area: right; }
    .arrow-btn:hover { background: rgba(59, 57, 30, .1); }
    .arrow-btn.disabled { opacity: .22; pointer-events: none; }
    .carousel-viewport {
      grid-area: viewport;
      min-width: 0;
      overflow: hidden;
      touch-action: pan-y;
    }
    .carousel-track {
      display: flex;
      align-items: stretch;
      transition: transform .38s cubic-bezier(.4, 0, .2, 1);
      will-change: transform;
    }
    .review-page {
      flex: 0 0 auto;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: start;
      gap: 22px;
    }
    .review-card {
      position: relative;
      min-width: 0;
      background: transparent;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 12px;
      padding: 0;
    }
    .review-text {
      margin: 0;
      color: var(--ink);
      font-family: Inter, sans-serif;
      font-size: clamp(13px, 3.5vw, 14px);
      line-height: 1.54;
      font-weight: 400;
      text-align: justify;
      text-justify: inter-word;
      overflow-wrap: break-word;
      word-break: normal;
      hyphens: none;
      -webkit-hyphens: none;
    }
    .review-text::before { content: '\201C'; }
    .review-text::after { content: '\201D'; }
    .review-text.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 11;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .read-more-btn {
      display: none;
      width: fit-content;
      margin-top: -4px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--ink);
      font-family: Inter, sans-serif;
      font-size: 11px;
      line-height: 1.2;
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 2px;
      cursor: pointer;
    }
    .read-more-btn.is-visible { display: inline-block; }
    .card-author {
      min-width: 0;
      display: flex;
      align-items: flex-start;
    }
    .author-details {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .author-name-row {
      color: var(--ink;
      font-size: 12.5px;
      line-height: 1.2;
      font-weight: 600;
      display: block;
    }
  </style>
</head>
<body></body>
</html>
