<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avaliações</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --ink: #3B391E;
      --ink-soft: rgba(59, 57, 30, .66);
      --ink-line: rgba(59, 57, 30, .22);
      --pad-x: clamp(10px, 3.6vw, 22px);
      --arrow: 32px;
    }
    html, body {
      width: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      color: var(--ink);
      font-family: Inter, sans-serif;
      overflow-x: hidden;
    }
    .widget {
      width: 100%;
      max-width: 100%;
      padding: 18px var(--pad-x) 22px;
      background: transparent;
    }
    .carousel-shell {
      width: 100%;
      display: grid;
      grid-template-columns: var(--arrow) minmax(0, 1fr) var(--arrow);
      align-items: start;
      gap: 8px;
    }
    .arrow-btn {
      width: var(--arrow);
      height: var(--arrow);
      border-radius: 999px;
      border: 1.4px solid rgba(59, 57, 30, .82);
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
      line-height: 1;
      margin-top: 2px;
      transition: background .2s, opacity .2s;
    }
    .arrow-btn:hover { background: rgba(59, 57, 30, .1); }
    .arrow-btn.disabled { opacity: .22; pointer-events: none; }
    .carousel-viewport { min-width: 0; overflow: hidden; }
    .carousel-track {
      display: flex;
      align-items: flex-start;
      gap: 0;
      transition: transform .38s cubic-bezier(.4, 0, .2, 1);
      will-change: transform;
    }
    .review-card {
      flex: 0 0 auto;
      min-width: 0;
      background: transparent;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 0;
    }
    .review-text {
      margin: 0;
      color: var(--ink);
      font-family: 'Libre Baskerville', serif;
      font-size: clamp(12.8px, 3.45vw, 13.8px);
      line-height: 1.58;
      font-weight: 400;
      overflow-wrap: break-word;
      word-break: normal;
      hyphens: auto;
    }
    .review-text::before { content: '\201C'; }
    .review-text::after { content: '\201D'; }
    .review-text.is-clamped {
      display: -webkit-box;
      -webkit-line-clamp: 7;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .read-more {
      width: max-content;
      margin-top: -7px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      font-family: Inter, sans-serif;
      font-size: 11px;
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .card-author {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      flex: 0 0 auto;
      background: rgba(59, 57, 30, .14);
      border: 1px solid rgba(59, 57, 30, .34);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }
    .author-details {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .author-name-row {
      color: var(--ink);
      font-size: 12.5px;
      line-height: 1.2;
      font-weight: 600;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .author-last-part {
      color: var(--ink-soft);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .source-label-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px 7px;
    }
    .star-row { display: flex; gap: 1px; }
    .star-row .s { color: rgba(59, 57, 30, .82); font-size: 10.5px; line-height: 1; }
    .source-label,
    .source-label a {
      color: var(--ink-soft);
      font-size: 10.5px;
      line-height: 1.2;
    }
    .source-label a { text-decoration: underline; text-underline-offset: 2px; }
    .skel-shell { display: grid; grid-template-columns: var(--arrow) minmax(0, 1fr) var(--arrow); gap: 8px; }
    .skel-arrow { width: var(--arrow); height: var(--arrow); border-radius: 999px; }
    .skel-row { min-width: 0; display: flex; gap: 0; overflow: hidden; }
    .skel-card { flex: 0 0 100%; padding: 0; }
    .sk {
      background: linear-gradient(90deg, rgba(59,57,30,.10) 25%, rgba(59,57,30,.18) 50%, rgba(59,57,30,.10) 75%);
      background-size: 200% 100%;
      animation: shim 1.4s infinite;
      border-radius: 5px;
    }
    @keyframes shim { to { background-position: -200% 0; } }

    @media (min-width: 760px) {
      :root { --pad-x: 48px; --arrow: 40px; }
      .widget { padding-top: 34px; padding-bottom: 38px; }
      .carousel-shell { display: flex; align-items: flex-start; gap: 0; }
      .arrow-btn { flex: 0 0 auto; width: 40px; height: 40px; margin: 4px 12px 0; font-size: 1.35rem; }
      .carousel-viewport { flex: 1; }
      .review-card { gap: 22px; padding: 0 44px; }
      .review-card:first-child { padding-left: 0; }
      .review-card + .review-card { border-left: 1px solid var(--ink-line); }
      .review-text { font-size: clamp(14px, 1.1vw, 16px); line-height: 1.72; }
      .review-text.is-clamped { display: block; overflow: visible; }
      .read-more { display: none; }
      .avatar { width: 46px; height: 46px; font-size: 13px; }
      .author-name-row { font-size: 14px; }
      .author-last-part { font-size: 12px; }
      .star-row .s { font-size: 11.5px; }
      .source-label, .source-label a { font-size: 11px; }
    }
  </style>
</head>
<body>
<div class="widget" id="widget"><div id="content"></div></div>
<div id="map" style="display:none"></div>
<script>
const CFG = {
  apiKey: "AIzaSyBHJkUQN1gaLkH2HVXVW-V3WY6lTGJX7rs",
  locations: [
    { label: "Local 1", placeId: "ChIJM9FLeUXl3JQRIP4GrM3Iw1M", googleUrl: "https://maps.google.com/?cid=ChIJM9FLeUXl3JQRIP4GrM3Iw1M" },
    { label: "Local 2", placeId: "ChIJba89okrj3JQRbHFXw3unq24", googleUrl: "https://maps.google.com/?cid=ChIJba89okrj3JQRbHFXw3unq24" }
  ]
};
const MANUAL_REVIEWS = [
  { author_name: "Bruna Marina da Silva Almeida", rating: 5, text: "Conversar com Aline é como se estivesse conversando com uma amiga próxima, ela entende e compreende e com base nisso, ela fala o que você precisa. Demonstra que não existe nada melhor que cuidar de nós mesmos, não só passa dieta como me ensina também!!", source: "panel" },
  { author_name: "Cecília Campos Siqueira", rating: 5, text: "Aline é uma profissional excepcional, me ajudou a ajustar a alimentação à minha rotina e às minhas necessidades, ao mesmo tempo que me apresentou novos alimentos e opções. Os atendimentos são ótimos, leves e atenciosos. Têm feito muita diferença na minha saúde e disposição para manter a constância com uma boa alimentação, que eu consigo fazer rolar no meu dia a dia e realmente gostar! Muito obrigada, querida :)", source: "panel" },
  { author_name: "Ana Flavia Machado Muniz Andrade", rating: 5, text: "Muito atenciosa e gentil. Disposta a entender e ouvir as necessidades do paciente. Parabéns Aline!", source: "panel" },
  { author_name: "Thalita Oliveira", rating: 5, text: "Super atenciosa e cuidadosa! Verifica de fato suas necessidades e mais do que isso adapta as orientações de forma palpável ao que vc pode fazer. Isso facilita já que a grande maioria não verifica se de fato vc vai conseguir seguir as orientações! Estou amando trabalhar com ela!", source: "panel" },
  { author_name: "Karolina Candido Silva Ferrari", rating: 5, text: "Adorei a consulta, muito simpática, sabe ouvir e entender nosssa rotina.", source: "panel" },
  { author_name: "Elaine Magi Vieira Marquezini", rating: 5, text: "Atenciosa e com boa disposição para interação entre paciente e profissional!", source: "panel" },
  { author_name: "Anônimo", rating: 5, text: "Perfeita em tudo, atendendo além das expectativas!!", source: "panel" },
  { author_name: "Bruna Marina da Silva Almeida", rating: 5, text: "Mudou minha visão sobre o profissional da nutrição e pretendo seguir a risca cada dica e conselho!", source: "panel" },
  { author_name: "Cecília Campos Siqueira", rating: 5, text: "Muito querida e muito simpática, fez questão de conhecer meus hábitos e minha rotina para ajustar meu plano alimentar a isso, e não impor uma dieta que eu não daria conta de seguir no dia a dia. Tem várias dicas e receitas legais e vai sugerindo alimentos novos para experimentar sem forçar.", source: "panel" },
  { author_name: "Anônimo", rating: 5, text: "Adorei a abordagem da Aline, super querida, me ouviu bastante, entendeu minha realidade e adaptou tudo para seguirmos da melhor forma!", source: "panel" }
];
const $ = id => document.getElementById(id);
const SKIP = new Set(["de", "da", "do", "dos", "das", "e", "von", "van"]);
let currentIdx = 0;
let allCards = [];
let reviewsCache = [];
let lastPerPage = 1;
function viewportWidth() {
  const content = $("content");
  const widget = $("widget");
  return Math.min(...[content?.clientWidth, widget?.clientWidth, document.documentElement.clientWidth, window.innerWidth].filter(Boolean));
}
function perPage() { return viewportWidth() >= 980 ? 3 : 1; }
function gap() { return perPage() > 1 ? 32 : 0; }
function initials(name) {
  if (!name || name === "Anônimo") return "?";
  const parts = name.trim().split(/\s+/).filter(w => !SKIP.has(w.toLowerCase()));
  return ((parts[0]?.[0] || "") + (parts[parts.length - 1]?.[0] || "")).toUpperCase();
}
function nameParts(name) {
  if (!name || name === "Anônimo") return { first: "Anônimo", last: "" };
  const parts = name.trim().split(/\s+/);
  return { first: parts[0], last: parts.length > 1 ? parts.slice(1).map(w => w[0].toUpperCase() + ".").join(" ") : "" };
}
function stars() { return [1,2,3,4,5].map(() => '<span class="s">★</span>').join(''); }
function showSkeleton() {
  const cards = Array.from({ length: perPage() }, () => `
    <div class="skel-card">
      <div class="sk" style="height:10px;width:92%;margin-bottom:8px"></div>
      <div class="sk" style="height:10px;width:78%;margin-bottom:8px"></div>
      <div class="sk" style="height:10px;width:58%;margin-bottom:18px"></div>
      <div style="display:flex;gap:10px;align-items:center"><div class="sk" style="width:36px;height:36px;border-radius:50%"></div><div style="flex:1"><div class="sk" style="height:9px;width:48%;margin-bottom:7px"></div><div class="sk" style="height:8px;width:36%"></div></div></div>
    </div>`).join('');
  $("content").innerHTML = `<div class="skel-shell"><div class="sk skel-arrow"></div><div class="skel-row">${cards}</div><div class="sk skel-arrow"></div></div>`;
}
function card(review, index) {
  const { first, last } = nameParts(review.author_name);
  const avatar = review.profile_photo_url ? `<img src="${review.profile_photo_url}" alt="${first}">` : initials(review.author_name);
  const fullName = last ? `${first} <span class="author-last-part">${last}</span>` : first;
  const source = review.source === "panel" ? "Avaliação via plataforma" : `<a href="${review._googleUrl || '#'}" target="_blank" rel="noopener">Avaliação no Google</a>`;
  const clamp = review.text.length > 180 ? ' is-clamped' : '';
  const more = review.text.length > 180 ? `<button class="read-more" type="button" onclick="toggleReview(${index}, this)">Ver mais</button>` : '';
  return `<article class="review-card">
    <p class="review-text${clamp}" id="review-${index}" lang="pt-BR">${review.text}</p>
    ${more}
    <div class="card-author"><div class="avatar">${avatar}</div><div class="author-details"><div class="author-name-row">— ${fullName}</div><div class="source-label-row"><span class="star-row">${stars()}</span><span class="source-label">${source}</span></div></div></div>
  </article>`;
}
function render(reviews) {
  reviewsCache = reviews;
  lastPerPage = perPage();
  currentIdx = 0;
  $("content").innerHTML = `<div class="carousel-shell"><button class="arrow-btn" id="arrow-left" onclick="slide(-1)" aria-label="Avaliação anterior">&#8249;</button><div class="carousel-viewport" id="viewport"><div class="carousel-track" id="track">${reviews.map(card).join('')}</div></div><button class="arrow-btn" id="arrow-right" onclick="slide(1)" aria-label="Próxima avaliação">&#8250;</button></div>`;
  allCards = Array.from($("track").children);
  sizeCards();
  updateArrows();
  initTouch($("viewport"));
}
function sizeCards() {
  const track = $("track");
  if (!track || !allCards.length) return;
  const pp = perPage();
  const viewW = track.parentElement.getBoundingClientRect().width;
  const w = pp === 1 ? viewW : (viewW - gap() * (pp - 1)) / pp;
  allCards.forEach(c => { c.style.width = Math.max(0, w) + "px"; });
  applyTranslate();
}
function applyTranslate() {
  const track = $("track");
  if (!track || !allCards.length) return;
  track.style.transform = `translateX(-${currentIdx * (allCards[0].offsetWidth + gap())}px)`;
}
function updateArrows() {
  if (!allCards.length) return;
  const maxIdx = Math.max(0, allCards.length - perPage());
  currentIdx = Math.min(currentIdx, maxIdx);
  $("arrow-left")?.classList.toggle("disabled", currentIdx === 0);
  $("arrow-right")?.classList.toggle("disabled", currentIdx >= maxIdx);
}
function slide(dir) {
  const maxIdx = Math.max(0, allCards.length - perPage());
  currentIdx = Math.max(0, Math.min(currentIdx + dir, maxIdx));
  applyTranslate();
  updateArrows();
}
function toggleReview(index, btn) {
  const el = $("review-" + index);
  const clamped = el.classList.toggle("is-clamped");
  btn.textContent = clamped ? "Ver mais" : "Ver menos";
}
function initTouch(el) {
  if (!el || el.dataset.touchReady) return;
  el.dataset.touchReady = "1";
  let startX = 0;
  el.addEventListener("touchstart", e => { startX = e.touches[0].clientX; }, { passive: true });
  el.addEventListener("touchend", e => {
    const dx = startX - e.changedTouches[0].clientX;
    if (Math.abs(dx) > 40) slide(dx > 0 ? 1 : -1);
  }, { passive: true });
}
function refresh() {
  if (reviewsCache.length && perPage() !== lastPerPage) return render(reviewsCache);
  currentIdx = 0;
  sizeCards();
  updateArrows();
}
window.addEventListener("resize", refresh);
if (window.ResizeObserver) new ResizeObserver(refresh).observe($("widget"));
function mergeAndFilter(results) {
  const google = results.filter(r => r.ok).flatMap(r => r.reviews.filter(rev => rev.rating === 5 && rev.text && rev.text.trim()).map(rev => ({ ...rev, source: "google", _googleUrl: r.googleUrl })));
  return [...google, ...MANUAL_REVIEWS];
}
function fetchAll() {
  showSkeleton();
  window.gm_authFailure = () => render(MANUAL_REVIEWS);
  const run = () => {
    const service = new google.maps.places.PlacesService($("map"));
    const results = new Array(CFG.locations.length).fill(null);
    let done = 0;
    CFG.locations.forEach((loc, idx) => {
      service.getDetails({ placeId: loc.placeId, fields: ["reviews"] }, (place, status) => {
        results[idx] = status === google.maps.places.PlacesServiceStatus.OK ? { ok: true, reviews: place.reviews || [], googleUrl: loc.googleUrl } : { ok: false, reviews: [], googleUrl: loc.googleUrl };
        if (++done === CFG.locations.length) render(mergeAndFilter(results));
      });
    });
  };
  if (window.google && window.google.maps) return run();
  window._mapsReady = run;
  document.getElementById("gscript")?.remove();
  const script = document.createElement("script");
  script.id = "gscript";
  script.src = `https://maps.googleapis.com/maps/api/js?key=${CFG.apiKey}&libraries=places&callback=_mapsReady`;
  script.onerror = () => render(MANUAL_REVIEWS);
  document.head.appendChild(script);
}
fetchAll();
</script>
</body>
</html>
